services:
  # PHP-FPM application container
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tidewrk_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - tidewrk

  # Nginx web server
  nginx:
    image: nginx:alpine
    container_name: tidewrk_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tidewrk

  # MySQL database
  db:
    image: mysql:8.0
    container_name: tidewrk_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-tidewrk}
      MYSQL_USER: ${DB_USERNAME:-tidewrk}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - tidewrk

  # Redis — used for queued imports (ShouldQueue) and cache
  redis:
    image: redis:alpine
    container_name: tidewrk_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - tidewrk

  # Queue worker — processes large Excel imports in the background
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tidewrk_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=300
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - db
      - redis
    networks:
      - tidewrk

networks:
  tidewrk:
    driver: bridge

volumes:
  dbdata:
    driver: local
